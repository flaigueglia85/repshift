name: Web build

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Type check and build
        run: npm run build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: repshift-web
          path: dist
          retention-days: 7
